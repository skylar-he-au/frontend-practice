<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>nth child</title>
  <style>
    .container li:last-child {
      color: red;
    }

    .container li:nth-child(3) {
      font-weight: bold;
    }

    p:nth-child(2) {
      color: blue;
    }

    p:nth-of-type(2) {
      color: green;
    }
  </style>
</head>

<body>
  <ul class="container">
    <li>hello world</li>
    <li>hello world</li>
    <li>hello world</li>
    <li>hello world</li>
    <li>hello world</li>
  </ul>
  <section>
    <h2>words</h2>
    <p>hello</p>
    <p>world</p>
  </section>
</body>

</html>
