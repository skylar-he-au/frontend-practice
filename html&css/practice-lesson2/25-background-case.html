<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    /* 背景图https://placekitten.com/1200/800 */
    /* 背景透明，文字居中不透明 */
    .cat-wrapper {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .cat-wrapper::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      bottom: 0;
      background-image: url(images/bg.jpg);
      background-size: cover;
      opacity: 0.5;
    }

    .cat-wrapper h1 {
      position: relative;
    }
  </style>
</head>

<body>
  <div class="cat-wrapper">
    <h1>Cute kittehs everywhere!</h1>
  </div>
</body>

</html>
