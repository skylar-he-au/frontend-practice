<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>radius</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: lightblue;
            border-radius: 50%;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 10px;
            background-color: lightcoral;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div></div>
    <button>Click me</button>
</body>
</html>
