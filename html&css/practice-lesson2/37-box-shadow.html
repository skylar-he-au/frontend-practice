<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box-shadow</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: lightblue;
            margin: 50px auto;
        }

        div:hover {
            box-shadow: 10px 10px 5px rgba(100, 17, 17, 0.3);
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
