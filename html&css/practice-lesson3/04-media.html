<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- <link rel="stylesheet" href="media.css" /> -->
    <style>
      *{
        padding: 0;
        margin: 0;
      }
      ul{
        list-style: none;
      }
      .container{
        width: 750px;
        margin: 0 auto;
        background-color: aqua;
      }
      .container ul li{
        width: 100px;
        height: 30px;
        background-color: orange;
      }

      @media screen and (max-width:750px) {
        .container{
          width: 100%;
        }
        .container ul li {
          width: 33.33%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <ul>
        <li>hello world</li>
        <li>hello world</li>
        <li>hello world</li>
        <li>hello world</li>
        <li>hello world</li>
        <li>hello world</li>
        <li>hello world</li>
        <li>hello world</li>
      </ul>
    </div>
  </body>
</html>
